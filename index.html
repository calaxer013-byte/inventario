<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background:#eef2f7; }
.card { border-radius:15px; }
.table thead { background:#212529; color:white; }
.low-stock { background:#ffe5e5 !important; }
</style>
</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4">📦 Inventario Profesional</h2>

<!-- DASHBOARD -->
<div class="row text-center mb-4">
<div class="col-md-3"><div class="card p-3 shadow"><h6>Total</h6><h3 id="total"></h3></div></div>
<div class="col-md-3"><div class="card p-3 shadow"><h6>Valor</h6><h3 id="valor"></h3></div></div>
<div class="col-md-3"><div class="card p-3 shadow"><h6>Bajo Stock</h6><h3 id="bajo"></h3></div></div>
<div class="col-md-3"><div class="card p-3 shadow"><h6>Más caro</h6><h3 id="caro"></h3></div></div>
</div>

<div id="alerta"></div>

<input id="buscador" class="form-control mb-3" placeholder="🔍 Buscar...">

<!-- FORM -->
<div class="card p-4 shadow mb-4">
<form id="formProducto" class="row g-3">
<input class="form-control col" id="nombre" placeholder="Nombre" required>
<input class="form-control col" id="precio" placeholder="Precio" required>
<input class="form-control col" id="stock" placeholder="Stock" required>
<button class="btn btn-success col">Agregar</button>
</form>
</div>

<!-- TABLA -->
<div class="card p-4 shadow">
<table class="table table-hover text-center">
<thead>
<tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th></th></tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- GRAFICAS -->
<div class="row mt-4">
<div class="col-md-6"><canvas id="grafStock"></canvas></div>
<div class="col-md-6"><canvas id="grafValor"></canvas></div>
</div>

</div>

<!-- MODAL EDITAR -->
<div class="modal fade" id="modalEditar">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5>Editar Producto</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<input type="hidden" id="editId">
<input class="form-control mb-2" id="editNombre">
<input class="form-control mb-2" id="editPrecio">
<input class="form-control mb-2" id="editStock">
</div>

<div class="modal-footer">
<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
<button type="button" class="btn btn-primary" onclick="guardarEdicion()">Guardar</button>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API = "http://localhost:3000/api/productos";

let chart1, chart2;

function alerta(msg,type="success"){
document.getElementById("alerta").innerHTML =
`<div class="alert alert-${type}">${msg}</div>`;
}

async function cargar(){
const res = await fetch(API);
const data = await res.json();

let total=0, valor=0, bajo=0, caro=0;

tabla.innerHTML="";

data.forEach(p=>{
total++;
valor += p.precio * p.stock;
if(p.stock < 5) bajo++;
if(p.precio > caro) caro = p.precio;

tabla.innerHTML += `
<tr class="${p.stock<5?'low-stock':''}">
<td>${p.id}</td>
<td>${p.nombre}</td>
<td>S/ ${p.precio}</td>
<td>${p.stock}</td>
<td>
<button class="btn btn-warning btn-sm" onclick='editar(${JSON.stringify(p)})'><i class="bi bi-pencil"></i></button>
<button class="btn btn-danger btn-sm" onclick='eliminar(${p.id})'><i class="bi bi-trash"></i></button>
</td>
</tr>`;
});

document.getElementById("total").innerText = total;
document.getElementById("valor").innerText = "S/ "+valor;
document.getElementById("bajo").innerText = bajo;
document.getElementById("caro").innerText = "S/ "+caro;

grafStock(data);
grafValor(data);
}

function grafStock(data){
if(chart1) chart1.destroy();
chart1 = new Chart(document.getElementById('grafStock'),{
type:'bar',
data:{
labels:data.map(p=>p.nombre),
datasets:[{label:'Stock',data:data.map(p=>p.stock)}]
}
});
}

function grafValor(data){
if(chart2) chart2.destroy();
chart2 = new Chart(document.getElementById('grafValor'),{
type:'pie',
data:{
labels:data.map(p=>p.nombre),
datasets:[{data:data.map(p=>p.precio*p.stock)}]
}
});
}

// CREAR
formProducto.addEventListener("submit", async e=>{
e.preventDefault();

await fetch(API,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
nombre:nombre.value,
precio:precio.value,
stock:stock.value
})
});

alerta("Producto creado");
formProducto.reset();
cargar();
});

// EDITAR
function editar(p){
editId.value = p.id;
editNombre.value = p.nombre;
editPrecio.value = p.precio;
editStock.value = p.stock;

new bootstrap.Modal(document.getElementById('modalEditar')).show();
}

// GUARDAR EDICION (SIN RECARGA)
async function guardarEdicion(){
await fetch(`${API}/${editId.value}`,{
method:"PUT",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
nombre:editNombre.value,
precio:editPrecio.value,
stock:editStock.value
})
});

alerta("Actualizado correctamente");

// cerrar modal
const modal = bootstrap.Modal.getInstance(document.getElementById('modalEditar'));
modal.hide();

cargar();
}

// ELIMINAR
async function eliminar(id){
if(!confirm("¿Eliminar producto?")) return;

await fetch(`${API}/${id}`,{method:"DELETE"});
alerta("Eliminado","danger");
cargar();
}

// BUSCAR
buscador.addEventListener("input",()=>{
let f = buscador.value.toLowerCase();
document.querySelectorAll("#tabla tr").forEach(tr=>{
tr.style.display = tr.innerText.toLowerCase().includes(f)? "":"none";
});
});

cargar();
</script>

</body>
</html>
